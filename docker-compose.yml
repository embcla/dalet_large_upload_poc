services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-init:
    image: minio/mc:latest
    entrypoint: ["/bin/sh", "/bucket-init/init.sh"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SERVICE_ACCESS_KEY: ${MINIO_SERVICE_ACCESS_KEY}
      MINIO_SERVICE_SECRET_KEY: ${MINIO_SERVICE_SECRET_KEY}
    volumes:
      - ./minio/bucket-init:/bucket-init:ro
      - ./minio/policy.json:/etc/minio-init/policy.json:ro

  backend:
    build:
      context: ./backend
      dockerfile: ../docker-images/backend/Dockerfile
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
      SQLITE_PATH: /app/data/db.sqlite
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${MINIO_BUCKET}
      S3_ACCESS_KEY_ID: ${MINIO_SERVICE_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${MINIO_SERVICE_SECRET_KEY}
    volumes:
      - ./backend/data:/app/data

  # Sits between the browser and the backend's tus endpoint so upload
  # bandwidth can be throttled (see toxiproxy-init), making upload progress
  # visible in the UI. The frontend talks to the backend through this proxy
  # (port 3001); the backend's own port 3000 remains directly reachable for
  # the test harness and debugging.
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    command: ["-host=0.0.0.0", "-config=/config/toxiproxy.json"]
    volumes:
      - ./toxiproxy/toxiproxy.json:/config/toxiproxy.json:ro
    ports:
      - "3001:3000"
      - "8474:8474"
    healthcheck:
      test: ["CMD", "/toxiproxy-cli", "list"]
      interval: 5s
      timeout: 5s
      retries: 12

  toxiproxy-init:
    image: curlimages/curl:latest
    entrypoint: ["/bin/sh", "/toxiproxy-init/init.sh"]
    depends_on:
      toxiproxy:
        condition: service_healthy
    environment:
      UPLOAD_THROTTLE_RATE_KB: ${UPLOAD_THROTTLE_RATE_KB}
    volumes:
      - ./toxiproxy:/toxiproxy-init:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker-images/frontend/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_started
      toxiproxy-init:
        condition: service_completed_successfully

volumes:
  minio-data:
