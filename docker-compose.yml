services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-init:
    image: minio/mc:latest
    entrypoint: ["/bin/sh", "/bucket-init/init.sh"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SERVICE_ACCESS_KEY: ${MINIO_SERVICE_ACCESS_KEY}
      MINIO_SERVICE_SECRET_KEY: ${MINIO_SERVICE_SECRET_KEY}
    volumes:
      - ./minio/bucket-init:/bucket-init:ro
      - ./minio/policy.json:/etc/minio-init/policy.json:ro

  backend:
    build:
      context: ./backend
      dockerfile: ../docker-images/backend/Dockerfile
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
      SQLITE_PATH: /app/data/db.sqlite
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${MINIO_BUCKET}
      S3_ACCESS_KEY_ID: ${MINIO_SERVICE_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${MINIO_SERVICE_SECRET_KEY}
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker-images/frontend/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  minio-data:
